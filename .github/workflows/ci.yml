name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet test
        working-directory: backend

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false
      - run: pnpm install --frozen-lockfile
        working-directory: frontend/weight-tracker-ui
      - run: pnpm test
        working-directory: frontend/weight-tracker-ui
